<!DOCTYPE html>
<html>
<head>
  <title>Smart RT - Warga</title>

  <!-- Tailwind CDN (sementara, nanti bisa build sendiri) -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="fixed top-2 left-2 right-2 text-gray-200 text-sm bg-gray-800 px-3 py-1 rounded-lg shadow flex justify-between">
  <div id="welcomeLogin">Selamat datang, silakan Login atau Register</div>
  <div id="runText" class="hidden">Hello World</div>
</div>

<div class="w-full max-w-sm p-6 bg-gray-800 rounded-2xl shadow-lg">

  <div class="text-2xl font-bold mb-1 text-center">
    <h2>Smart System RT 01/01</h2>
    <h2>Cilangkap - Cipayung</h2>
    <h2 class="mb-6">Jakarta Timur</h2>
  </div>
  <!-- AUTH SECTION -->
  <div id="authSection">
    <input id="username" class="w-full mb-2 p-2 rounded bg-gray-700" placeholder="Username">
    <input id="password" type="password" class="w-full mb-2 p-2 rounded bg-gray-700" placeholder="Password">

    <!-- REGISTER EXTRA -->
    <div id="registerFields" class="hidden">
      <input id="nama" class="w-full mb-2 p-2 rounded bg-gray-700" placeholder="Nama lengkap">
      <input id="no_rumah" class="w-full mb-2 p-2 rounded bg-gray-700" placeholder="No Rumah">
      <input id="no_hp" class="w-full mb-2 p-2 rounded bg-gray-700" placeholder="No HP (WA)">
    </div>

    <div class="flex gap-2">
      <button id="btnLogin" onclick="handleLoginClick()" class="flex-1 bg-blue-500 p-2 rounded">
        Login
      </button>
      <button id="btnRegister" onclick="register()" class="flex-1 bg-green-500 p-2 rounded">
        Register
      </button>
    </div>

    <!-- DEV LOGIN BUTTON (hidden in production) -->
    <button id="devLoginBtn" onclick="loginDev()" class="w-full mt-2 bg-purple-600 p-2 rounded text-xs opacity-50 hover:opacity-100">
      🔧 Dev Login
    </button>
  </div>

  <!-- USER SECTION -->
  <div id="userSection" class="hidden text-center">

    <div class="flex justify-between items-center mb-4">
      <button onclick="userportal()" id="welcome" class="text-lg font-bold underline">
        Welcome, <span id="userName"></span>
      </button>
      <button onclick="logout()" 
        class="text-sm text-gray-400 underline">
        Logout
      </button>
    </div>

    <button id="panicBtn" onclick="panic()" 
      class="w-full h-1/4 bg-red-600 hover:bg-red-700 py-14 rounded text-5xl font-bold">
      🚨PANIC🚨
    </button>

  </div>

  <p id="status" class="mt-4 text-center text-sm text-yellow-400"></p>

</div>

<div class="fixed bottom-2 left-2 right-2 text-gray-200 text-sm bg-gray-800 px-3 py-1 rounded-lg shadow flex justify-between">
  <span>by ARS Tech - 2026</span>
  <span id="connStatus">Disconnected</span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>
<script src="public.js"></script>

</body>
</html>
